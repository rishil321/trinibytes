<header>
  <nav
    class="navbar navbar-expand-lg navbar-toggleable-sm bg-primary border-bottom box-shadow mb-3 navbar-dark"
  >
    <div class="container-fluid">
      <img height="50" class="navbar-brand" src="assets/blogging_icon.png">
      <a class="navbar-brand" [routerLink]="['/']">trinibytes</a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target=".navbar-collapse"
        aria-label="Toggle navigation"
        [attr.aria-expanded]="isExpanded"
        (click)="toggle()"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div
        class="navbar-collapse collapse d-sm-inline-flex justify-content-end"
        [ngClass]="{ show: isExpanded }"
      >
        <ul class="navbar-nav flex-grow">
          <li
            class="nav-item"
            [routerLinkActive]="['link-active']"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <a class="nav-link" [routerLink]="['/']">Home</a>
          </li>
          <li class="nav-item" [routerLinkActive]="['link-active']">
            <a class="nav-link" [routerLink]="['/caribbeanjobs-data']">Manage Scrapers</a>
          </li>
          <li
            class="nav-item"
            [routerLinkActive]="['link-active']"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <a class="nav-link" [routerLink]="['/aboutme']">About Me</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
